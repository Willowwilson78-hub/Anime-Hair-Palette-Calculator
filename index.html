    <div class="glow-circle glow-1"></div>

    <div class="container">
        <header>
            <h1>Anime Hair Palette Generator</h1>
            <p>Slide smoothly on the wheel or fine-tune sliders for real-time calculation</p>
        </header>

        <div class="workspace">
            <div class="control-panel">
                <div class="input-group">
                    <label>Color Wheel</label>
                    
                    <div class="wheel-container" id="wheelContainer">
                        <canvas id="colorWheel" width="260" height="260"></canvas>
                    </div>

                    <div class="picker-wrapper">
                        <div class="custom-color-circle" id="circlePreview">
                            <input type="color" id="baseColorPicker" value="#6366f1">
                        </div>
                        <input type="text" id="baseHexInput" class="hex-input" value="#6366f1" maxlength="7">
                    </div>
                </div>

                <div class="slider-container">
                    <div class="slider-header">
                        <label>Shadow Intensity</label>
                        <span id="shadowVal">40%</span>
                    </div>
                    <input type="range" id="shadowSlider" min="10" max="80" value="40">
                </div>

                <div class="slider-container">
                    <div class="slider-header">
                        <label>Highlight Intensity</label>
                        <span id="highlightVal">35%</span>
                    </div>
                    <input type="range" id="highlightSlider" min="10" max="80" value="35">
                </div>
            </div>

            <div class="preview-panel">
                <div class="palette-display">
                    <div class="color-card" onclick="copyToClipboard('highlightHex')">
                        <div class="color-swatch" id="highlightSwatch"></div>
                        <div class="color-info">
                            <span class="color-role">Highlight (Tint)</span>
                            <span class="color-value" id="highlightHex">#FFFFFF</span>
                        </div>
                    </div>

                    <div class="color-card" onclick="copyToClipboard('baseHex')">
                        <div class="color-swatch" id="baseSwatch"></div>
                        <div class="color-info">
                            <span class="color-role">Base Color</span>
                            <span class="color-value" id="baseHex">#6366f1</span>
                        </div>
                    </div>

                    <div class="color-card" onclick="copyToClipboard('shadowHex')">
                        <div class="color-swatch" id="shadowSwatch"></div>
                        <div class="color-info">
                            <span class="color-role">Shadow (Shade)</span>
                            <span class="color-value" id="shadowHex">#000000</span>
                        </div>
                    </div>
                </div>

                <div class="hair-preview-box">
                    <div class="hair-layer" id="previewHighlight">Highlight</div>
                    <div class="hair-layer" id="previewBase">Base</div>
                    <div class="hair-layer" id="previewShadow">Shadow</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Color copied to clipboard!</div>

    <script>
        const canvas = document.getElementById('colorWheel');
        const ctx = canvas.getContext('2d');
        const wheelContainer = document.getElementById('wheelContainer');
        
        const baseColorPicker = document.getElementById('baseColorPicker');
        const baseHexInput = document.getElementById('baseHexInput');
        const shadowSlider = document.getElementById('shadowSlider');
        const highlightSlider = document.getElementById('highlightSlider');

        const shadowVal = document.getElementById('shadowVal');
        const highlightVal = document.getElementById('highlightVal');

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const outerRadius = canvas.width / 2 - 2;
        const innerRadius = outerRadius - 24; 
        const diamondSize = innerRadius * 0.95; 

        let currentHue = 240; 
        let currentSat = 100;
        let currentLight = 50;
        let activeZone = null; 

        function drawPicker() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < 360; i++) {
                let startAngle = (i - 90) * Math.PI / 180;
                let endAngle = (i - 88) * Math.PI / 180;
                ctx.beginPath();
                ctx.arc(centerX, centerY, (outerRadius + innerRadius)/2, startAngle, endAngle);
                ctx.strokeStyle = `hsl(${i}, 100%, 50%)`;
                ctx.lineWidth = (outerRadius - innerRadius);
                ctx.stroke();
            }

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(45 * Math.PI / 180); 
            
            const boxTopLeft = -diamondSize / 2;
            
            let gradH = ctx.createLinearGradient(boxTopLeft, 0, boxTopLeft + diamondSize, 0);
            gradH.addColorStop(0, '#fff');
            gradH.addColorStop(1, `hsl(${currentHue}, 100%, 50%)`);
            ctx.fillStyle = gradH;
            ctx.fillRect(boxTopLeft, boxTopLeft, diamondSize, diamondSize);

            let gradV = ctx.createLinearGradient(0, boxTopLeft, 0, boxTopLeft + diamondSize);
            gradV.addColorStop(0, 'rgba(0,0,0,0)');
            gradV.addColorStop(1, '#000');
            ctx.fillStyle = gradV;
            ctx.fillRect(boxTopLeft, boxTopLeft, diamondSize, diamondSize);
            ctx.restore();

            let hueAngle = (currentHue - 90) * Math.PI / 180;
            let rCenter = (outerRadius + innerRadius) / 2;
            let ringX = centerX + rCenter * Math.cos(hueAngle);
            let ringY = centerY + rCenter * Math.sin(hueAngle);
            
            ctx.beginPath();
            ctx.arc(ringX, ringY, 6, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.stroke();
            ctx.shadowBlur = 0; 

            let satX = (currentSat / 100) * diamondSize - (diamondSize / 2);
            let litY = ((100 - (currentLight / (100 - (currentSat/100)*50) * 100)) / 100) * diamondSize - (diamondSize / 2);
            
            let rad45 = 45 * Math.PI / 180;
            let diaX = centerX + (satX * Math.cos(rad45) - litY * Math.sin(rad45));
            let diaY = centerY + (satX * Math.sin(rad45) + litY * Math.cos(rad45));

            ctx.beginPath();
            ctx.arc(diaX, diaY, 6, 0, Math.PI * 2);
            ctx.strokeStyle = currentLight > 60 ? '#000000' : '#ffffff';
            ctx.lineWidth = 2.5;
            ctx.stroke();
        }

        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) { h = s = 0; } 
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        }

        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        function calculatePalette() {
            const baseHex = hslToHex(currentHue, currentSat, currentLight);
            baseColorPicker.value = baseHex;
            baseHexInput.value = baseHex.toUpperCase();
            
            document.getElementById('circlePreview').style.backgroundColor = baseHex;
            
            const sIntensity = shadowSlider.value / 100;
            const hIntensity = highlightSlider.value / 100;

            shadowVal.innerText = `${shadowSlider.value}%`;
            highlightVal.innerText = `${highlightSlider.value}%`;

            let shadowH = (currentHue + 15) % 360; 
            let shadowS = Math.min(100, currentSat + (15 * sIntensity));
            let shadowL = Math.max(5, currentLight - (45 * sIntensity));
            const shadowHex = hslToHex(shadowH, shadowS, shadowL);

            let highlightH = (currentHue - 10 + 360) % 360;
            let highlightS = Math.max(10, currentSat - (20 * hIntensity));
            let highlightL = Math.min(98, currentLight + (40 * hIntensity));
            const highlightHex = hslToHex(highlightH, highlightS, highlightL);

            updateUI('base', baseHex);
            updateUI('shadow', shadowHex);
            updateUI('highlight', highlightHex);
            
            drawPicker();
        }

        function updateUI(role, hex) {
            document.getElementById(`${role}Swatch`).style.backgroundColor = hex;
            document.getElementById(`${role}Hex`).innerText = hex.toUpperCase();
            document.getElementById(`preview${role.charAt(0).toUpperCase() + role.slice(1)}`).style.backgroundColor = hex;
        }

        function handlePointer(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            const rx = x - centerX;
            const ry = y - centerY;
            const d = Math.sqrt(rx * rx + ry * ry);

            if (!activeZone) {
                if (d >= innerRadius && d <= outerRadius + 8) activeZone = 'ring';
                else activeZone = 'diamond';
            }

            if (activeZone === 'ring') {
                let angle = Math.atan2(ry, rx) * (180 / Math.PI) + 90;
                if (angle < 0) angle += 360;
                currentHue = angle;
            } else if (activeZone === 'diamond') {
                let rad45 = -45 * Math.PI / 180;
                let rotX = rx * Math.cos(rad45) - ry * Math.sin(rad45);
                let rotY = rx * Math.sin(rad45) + ry * Math.cos(rad45);

                let halfSize = diamondSize / 2;
                rotX = Math.max(-halfSize, Math.min(halfSize, rotX));
                rotY = Math.max(-halfSize, Math.min(halfSize, rotY));

                let pctX = (rotX + halfSize) / diamondSize;
                let pctY = (rotY + halfSize) / diamondSize;

                currentSat = Math.round(pctX * 100);
                let v = 1 - pctY;
                currentLight = Math.round((v * (1 - (pctX * 0.5))) * 100);
                currentLight = Math.max(0, Math.min(100, currentLight));
            }

            calculatePalette();
        }

        canvas.addEventListener('mousedown', (e) => { activeZone = null; handlePointer(e); });
        window.addEventListener('mousemove', (e) => { if (activeZone) handlePointer(e); });
        window.addEventListener('mouseup', () => { activeZone = null; });

        canvas.addEventListener('touchstart', (e) => { activeZone = null; handlePointer(e); }, { passive: true });
        window.addEventListener('touchmove', (e) => { if (activeZone) handlePointer(e); }, { passive: true });
        window.addEventListener('touchend', () => { activeZone = null; });

        baseColorPicker.addEventListener('input', (e) => {
            const hsl = hexToHsl(e.target.value);
            currentHue = hsl.h; currentSat = hsl.s; currentLight = hsl.l;
            calculatePalette();
        });

        shadowSlider.addEventListener('input', calculatePalette);
        highlightSlider.addEventListener('input', calculatePalette);

        baseHexInput.addEventListener('input', (e) => {
            let val = e.target.value;
            if(!val.startsWith('#')) val = '#' + val;
            if(val.length === 7 && /^#[0-9A-F]{6}$/i.test(val)) {
                const hsl = hexToHsl(val);
                currentHue = hsl.h; currentSat = hsl.s; currentLight = hsl.l;
                calculatePalette();
            }
        });

        window.copyToClipboard = function(id) {
            const text = document.getElementById(id).innerText;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast(`Copied: ${text}`))
                    .catch(() => useFallbackCopy(text));
            } else {
                useFallbackCopy(text);
            }
        }

        function useFallbackCopy(text) {
            const dummy = document.createElement('textarea');
            dummy.value = text;
            dummy.style.position = 'fixed';
            document.body.appendChild(dummy);
            dummy.select();
            try {
                document.execCommand('copy');
                showToast(`Copied: ${text}`);
            } catch (err) {
                showToast('Failed to copy color');
            }
            document.body.removeChild(dummy);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        const initHsl = hexToHsl(baseColorPicker.value);
        currentHue = initHsl.h; currentSat = initHsl.s; currentLight = initHsl.l;
        calculatePalette();
    </script>
